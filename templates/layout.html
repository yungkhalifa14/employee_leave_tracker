<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Urlopów</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="sidebar">
        <h1>Monitor Urlopów</h1>
        <nav>
            <a href="{{ url_for('dashboard') }}">Panel Główny</a>
            <a href="{{ url_for('employees') }}">Pracownicy</a>
            <a href="{{ url_for('holidays') }}">Święta</a>
            <a href="{{ url_for('leaves') }}">Urlopy</a>
            <a href="{{ url_for('shutdown') }}" class="quit-btn"
                onclick="return confirm('Czy na pewno chcesz zamknąć aplikację?');">Zamknij Aplikację</a>
        </nav>
    </div>
    <div class="main-content">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="flashes">
            {% for category, message in messages %}
            <div class="alert {{ category }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>
</body>

</html>
