{% extends "layout.html" %}

{% block content %}
<div class="main-content" style="display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 80px);">
    <div class="card auth-card" style="max-width: 400px; width: 100%;">
        <div class="auth-header">
            <h1>Dołącz do Zespołu</h1>
            <p>Witaj <strong>{{ employee[1] }}</strong>! Ustaw hasło, aby aktywować konto.</p>
        </div>
        
        <form method="POST">
            <div class="form-group">
                <label for="username">Nazwa użytkownika (Login)</label>
                <input type="text" id="username" name="username" required placeholder="np. jkowalski" value="{{ employee[2] if not employee[2].startswith('invite_') else '' }}">
            </div>
            
            <div class="form-group">
                <label for="email">Adres Email</label>
                <input type="email" id="email" name="email" required placeholder="np. jan.kowalski@firma.pl">
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="password">Hasło</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <div class="form-group">
                    <label for="confirm_password">Potwierdź Hasło</label>
                    <input type="password" id="confirm_password" name="confirm_password" required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary" style="margin-top: 16px; width: 100%;">Aktywuj konto i zaloguj się</button>
        </form>
    </div>
</div>
{% endblock %}
