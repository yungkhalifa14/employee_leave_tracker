{% extends "layout.html" %}

{% block content %}
<div class="auth-wrapper">
    <div class="card auth-card">
        <div class="auth-header">
            <h1>Aktywuj Konto</h1>
            <p>Witaj <strong>{{ employee[1] }}</strong>! Utwórz swoje dane logowania.</p>
        </div>
        
        <form method="POST">
            <div class="form-group">
                <label for="username">Nazwa użytkownika (Login)</label>
                <input type="text" id="username" name="username" required placeholder="np. jkowalski">
            </div>
            
            <div class="form-group">
                <label for="password">Utwórz Hasło</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="margin-top: 16px;">Aktywuj konto i zaloguj się</button>
        </form>
    </div>
</div>
{% endblock %}
