{% extends "layout.html" %}

{% block content %}
<h2>Zarezerwuj Urlop</h2>

<div class="card single-card">
    <form method="post">
        <div class="form-group">
            <label for="employee_id">Pracownik</label>
            <select id="employee_id" name="employee_id" required>
                <option value="" disabled selected>Wybierz pracownika...</option>
                {% for id, name in employees %}
                <option value="{{ id }}">{{ name }} (ID: {{ id }})</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="start_date">Data Rozpoczęcia</label>
                <input type="date" id="start_date" name="start_date" required>
            </div>

            <div class="form-group">
                <label for="end_date">Data Zakończenia</label>
                <input type="date" id="end_date" name="end_date" required>
            </div>
        </div>

        <div class="form-group">
            <label for="reason">Powód</label>
            <input type="text" id="reason" name="reason" placeholder="np. Urlop Wypoczynkowy, L4" required>
        </div>

        <button type="submit" class="btn-primary">Zarezerwuj Urlop</button>
    </form>
</div>

<div class="card list-view" style="margin-top: 20px;">
    <h3>Zarezerwowane Urlopy</h3>
    <table>
        <thead>
            <tr>
                <th>Pracownik</th>
                <th>Od</th>
                <th>Do</th>
                <th>Powód</th>
                <th>Akcje</th>
            </tr>
        </thead>
        <tbody>
            {% for leave in leaves %}
            <tr>
                <td>{{ leave[1] }}</td>
                <td>{{ leave[2] }}</td>
                <td>{{ leave[3] }}</td>
                <td>{{ leave[4] }}</td>
                <td>
                    <div class="action-btns">
                        <a href="{{ url_for('edit_leave', leave_id=leave[0]) }}" class="btn-edit">Edytuj</a>
                        <form action="{{ url_for('delete_leave', leave_id=leave[0]) }}" method="POST"
                            onsubmit="return confirm('Czy na pewno chcesz usunąć ten urlop?');" style="display:inline;">
                            <button type="submit" class="btn-delete">Usuń</button>
                        </form>
                    </div>
                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="5">Brak zarezerwowanych urlopów.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
