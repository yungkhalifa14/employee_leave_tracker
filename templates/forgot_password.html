{% extends "layout.html" %}

{% block content %}
<div class="main-content" style="display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 120px);">
    <div class="card auth-card" style="max-width: 400px; width: 100%;">
        <div class="auth-header">
            <h1>Reset Hasła</h1>
            <p>Wprowadź swój adres email, aby otrzymać link do resetowania hasła.</p>
        </div>
        
        <form method="POST">
            <div class="form-group">
                <label for="email">Adres Email</label>
                <input type="email" id="email" name="email" required placeholder="np. jan.kowalski@firma.pl">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 12px;">Wyślij link</button>
        </form>
        
        <div style="margin-top: 24px; text-align: center;">
            <a href="{{ url_for('auth.login') }}" style="color: var(--text-secondary); text-decoration: none; font-size: 0.9rem;">
                &larr; Powrót do logowania
            </a>
        </div>
    </div>
</div>
{% endblock %}
