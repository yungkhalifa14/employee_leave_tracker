{% extends "layout.html" %}

{% block content %}
<div class="main-content">
    <div style="max-width: 600px; margin: 0 auto;">
        <h1>Edytuj Pracownika</h1>
        <div class="card">
            <form method="POST">
                <div class="form-group">
                    <label for="name">Imię i nazwisko</label>
                    <input type="text" id="name" name="name" value="{{ emp.name }}" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" value="{{ emp.email or '' }}" placeholder="np. jan.kowalski@firma.pl">
                </div>

                <div class="form-group">
                    <label for="leave_limit">Limit urlopu</label>
                    <input type="number" id="leave_limit" name="leave_limit" value="{{ emp.leave_limit or 26 }}" min="0" required>
                </div>

                <div class="form-group">
                    <label for="team_id">Zespół</label>
                    <select id="team_id" name="team_id">
                        <option value="-1" {% if not emp.team_id %}selected{% endif %}>Brak zespołu</option>
                        {% for team in teams %}
                        <option value="{{ team[0] }}" {% if emp.team_id == team[0] %}selected{% endif %}>{{ team[1] }}</option>
                        {% endfor %}
                    </select>
                </div>

                {% if current_user.role == 'admin' and current_user.id != emp.id %}
                <div class="form-group">
                    <label for="role">Rola</label>
                    <select id="role" name="role">
                        <option value="employee" {% if emp.role == 'employee' %}selected{% endif %}>Employee</option>
                        <option value="manager" {% if emp.role == 'manager' %}selected{% endif %}>Manager</option>
                        <option value="admin" {% if emp.role == 'admin' %}selected{% endif %}>Admin</option>
                    </select>
                </div>
                {% endif %}

                <div class="form-group" style="border-top: 1px solid var(--border); margin-top: 24px; padding-top: 24px;">
                    <label for="new_password">Zmień Hasło (opcjonalnie)</label>
                    <input type="password" id="new_password" name="new_password" placeholder="Pozostaw puste, aby nie zmieniać">
                    <p style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 4px;">Wprowadź nowe hasło dla tego użytkownika, jeśli chcesz je zresetować.</p>
                </div>

                <div style="display: flex; gap: 12px; margin-top: 24px;">
                    <button type="submit" class="btn btn-primary">Zapisz Zmiany</button>
                    <a href="{{ url_for('employees') }}" class="btn btn-secondary">Anuluj</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
