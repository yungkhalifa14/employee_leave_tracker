{% extends "layout.html" %}

{% block content %}
<div class="dashboard-header">
    <h2>Edytuj Użytkownika - {{ employee[1] }}</h2>
</div>

<div class="card single-card">
    <form method="POST" action="{{ url_for('edit_employee', emp_id=employee[0]) }}">
        <!-- Readonly for non-admins -->
        <div class="form-group">
            <label for="name">Imię i nazwisko</label>
            <input type="text" id="name" name="name" required value="{{ employee[1] }}" {% if current_user.role != 'admin' %}readonly{% endif %}>
        </div>
        <div class="form-group">
            <label for="leave_limit">Limit Urlopu (dni w roku)</label>
            <input type="number" id="leave_limit" name="leave_limit" required value="{{ employee[2] }}" {% if current_user.role != 'admin' %}readonly{% endif %}>
        </div>
        <div class="form-group">
            <label for="team_id">Zespół</label>
            <select id="team_id" name="team_id" {% if current_user.role != 'admin' %}disabled{% endif %}>
                <option value="">Brak zespołu</option>
                {% for team in teams %}
                <option value="{{ team[0] }}" {% if employee[6] == team[0] %}selected{% endif %}>{{ team[1] }}</option>
                {% endfor %}
            </select>
        </div>
        
        {% if current_user.role == 'admin' %}
        <div style="margin-top: 32px; display: flex; gap: 16px;">
            <button type="submit" class="btn btn-primary" style="flex: 2;">Zapisz Zmiany</button>
            <a href="{{ url_for('employees') }}" class="btn btn-secondary" style="flex: 1; text-align: center;">Anuluj</a>
        </div>
        {% else %}
        <div style="margin-top: 32px;">
            <a href="{{ url_for('employees') }}" class="btn btn-secondary">Wróć do listy</a>
            <p style="color: var(--text-secondary); margin-top: 12px; font-size: 14px;">Tylko administrator może edytować przydział i limity.</p>
        </div>
        {% endif %}
    </form>
</div>
{% endblock %}
