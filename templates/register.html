<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rejestracja - Monitor Urlopów</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { justify-content: center; align-items: center; padding: 0; }
        .main-content { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    </style>
</head>
<body>
    <div class="main-content">
        <div class="auth-card card">
            <div class="auth-header">
                <h1>Konto Menedżera</h1>
                <p>Zarejestruj się, aby zarządzać zespołami i urlopami</p>
            </div>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                <div class="flashes">
                    {% for category, message in messages %}
                    <div class="alert {{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('auth.register') }}">
                <div class="form-group">
                    <label for="name">Imię i nazwisko</label>
                    <input type="text" id="name" name="name" required placeholder="np. Jan Kowalski">
                </div>
                <div class="form-group">
                <label for="username">Nazwa Użytkownika</label>
                <input type="text" id="username" name="username" required autocomplete="username">
            </div>
            
            <div class="form-group">
                <label for="email">Adres Email</label>
                <input type="email" id="email" name="email" required placeholder="np. jan.kowalski@firma.pl">
            </div>
                <div class="form-group">
                    <label for="password">Hasło</label>
                    <input type="password" id="password" name="password" required minlength="8">
                </div>
                <div class="form-group">
                    <label for="confirm_password">Potwierdź Hasło</label>
                    <input type="password" id="confirm_password" name="confirm_password" required minlength="8">
                </div>
                <button type="submit" class="btn btn-primary" style="margin-top: 16px;">Utwórz konto menedżera</button>
            </form>
            
            <div class="auth-footer">
                Masz już konto? <a href="{{ url_for('auth.login') }}">Zaloguj się</a>
            </div>
        </div>
    </div>
</body>
</html>
