<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rejestracja - Monitor Urlopów</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { justify-content: center; align-items: center; padding: 0; }
        .main-content { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    </style>
</head>
<body>
    <div class="main-content">
        <div class="auth-card card">
            <div class="auth-header">
                <h1>Utwórz konto</h1>
                <p>Zarejestruj się, aby uzyskać dostęp</p>
            </div>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                <div class="flashes">
                    {% for category, message in messages %}
                    <div class="alert {{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('register') }}">
                <div class="form-group">
                    <label for="name">Imię i nazwisko</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="username">Nazwa użytkownika</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Hasło</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="form-group">
                    <label for="team_id">Zarządzanie / Zespół</label>
                    <select id="team_id" name="team_id">
                        <option value="">Brak powiązanego zespołu</option>
                        {% for team in teams %}
                        <option value="{{ team[0] }}">{{ team[1] }}</option>
                        {% endfor %}
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="margin-top: 16px;">Zarejestruj się</button>
            </form>
            
            <div class="auth-footer">
                Masz już konto? <a href="{{ url_for('login') }}">Zaloguj się</a>
            </div>
        </div>
    </div>
</body>
</html>
