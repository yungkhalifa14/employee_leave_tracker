{% extends "layout.html" %}

{% block content %}
<h2>Święta</h2>

<div class="card-container">
    <div class="card add-form">
        <h3>Dodaj Nowe Święto</h3>
        <form method="post">
            <div class="form-group">
                <label for="date">Data</label>
                <input type="date" id="date" name="date" required>
            </div>
            <div class="form-group">
                <label for="name">Nazwa Święta</label>
                <input type="text" id="name" name="name" required placeholder="np. Nowy Rok">
            </div>
            <button type="submit" class="btn-primary">Dodaj Święto</button>
        </form>
    </div>

    <div class="card list-view">
        <h3>Nadchodzące Święta</h3>
        <ul class="clean-list">
            {% for date, name in holidays %}
            <li>
                <span class="date-badge">{{ date }}</span>
                {{ name }}
            </li>
            {% else %}
            <p>Brak zarejestrowanych świąt.</p>
            {% endfor %}
        </ul>
    </div>
</div>
{% endblock %}
