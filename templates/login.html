<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie - Monitor Urlopów</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            justify-content: center;
            align-items: center;
            padding: 0;
        }
        .main-content {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }
    </style>
</head>
<body>
    <div class="main-content">
        <div class="auth-card card">
            <div class="auth-header">
                <h1>Witaj ponownie</h1>
                <p>Zaloguj się do platformy monitorowania urlopów</p>
            </div>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                <div class="flashes">
                    {% for category, message in messages %}
                    <div class="alert {{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label for="username">Nazwa użytkownika</label>
                    <input type="text" id="username" name="username" required autocomplete="username" autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Hasło</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary" style="margin-top: 16px;">Zaloguj się</button>
            </form>
            
            <div class="auth-footer">
                Nie masz konta? <a href="{{ url_for('register') }}">Zarejestruj się</a>
            </div>
        </div>
    </div>
</body>
</html>
