{% extends "layout.html" %}

{% block content %}
<div class="main-content" style="display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 120px);">
    <div class="card auth-card" style="max-width: 400px; width: 100%;">
        <div class="auth-header">
            <h1>Nowe Hasło</h1>
            <p>Wprowadź nowe hasło dla swojego konta.</p>
        </div>
        
        <form method="POST">
            <div class="form-group">
                <label for="password">Nowe Hasło</label>
                <input type="password" id="password" name="password" required minlength="8">
            </div>
            
            <div class="form-group">
                <label for="confirm_password">Potwierdź Nowe Hasło</label>
                <input type="password" id="confirm_password" name="confirm_password" required minlength="8">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 12px;">Zresetuj Hasło</button>
        </form>
    </div>
</div>
{% endblock %}
